name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt

      - name: Install CPU PyTorch (avoids 5 GB CUDA wheels on CI)
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.6,<3.0"

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Show installed versions
        run: |
          python --version
          pip list

      - name: Run pytest
        env:
          # FakeMTEngine fixture means no real weights are downloaded; keep
          # HF cache outside the runner home dir for clarity.
          HF_HOME: ${{ runner.temp }}/hf-cache
          # Disable noisy torch warnings in CI logs.
          PYTHONWARNINGS: ignore::DeprecationWarning
        run: pytest -q --maxfail=1 --durations=15
